{% extends 'dashboard/base.html' %}
{% load static %}

{% block page_title %}Удалить новость{% endblock %}

{% block actions %}
<a href="{% url 'dashboard:news_list' %}" class="btn btn-neon">
    <i class="fas fa-arrow-left me-2"></i>К списку
</a>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="glass-card p-4 text-center">
            <i class="fas fa-exclamation-triangle text-warning fa-3x mb-3"></i>
            <h3>Подтверждение удаления</h3>
            <p class="mb-4">Вы уверены, что хотите удалить новость <strong>"{{ news.title }}"</strong>?</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-2"></i>Удалить
                    </button>
                    <a href="{% url 'dashboard:news_list' %}" class="btn btn-secondary">
                        Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

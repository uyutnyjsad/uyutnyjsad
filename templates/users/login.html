{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg">
            <div class="card-header border-0 py-4 text-center" style="background: var(--primary-dark);">
                <i class="fas fa-sign-in-alt fa-3x mb-3 text-light"></i>
                <h2 class="mb-0 text-light" style="font-family: 'Playfair Display', serif;">Вход в систему</h2>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="id_username" class="form-label fw-bold">
                            <i class="fas fa-user me-2" style="color: var(--primary-dark);"></i>Имя пользователя
                        </label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--accent-light); border-color: var(--primary-dark);">
                                <i class="fas fa-user" style="color: var(--primary-dark);"></i>
                            </span>
                            <input type="text" name="username" class="form-control" id="id_username" 
                                   placeholder="Введите ваше имя пользователя" required
                                   style="border-color: var(--primary-dark);">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-bold">
                            <i class="fas fa-lock me-2" style="color: var(--primary-dark);"></i>Пароль
                        </label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--accent-light); border-color: var(--primary-dark);">
                                <i class="fas fa-lock" style="color: var(--primary-dark);"></i>
                            </span>
                            <input type="password" name="password" class="form-control" id="id_password" 
                                   placeholder="Введите ваш пароль" required
                                   style="border-color: var(--primary-dark);">
                            <button type="button" class="input-group-text toggle-password" 
                                    style="background: var(--accent-light); border-color: var(--primary-dark);">
                                <i class="fas fa-eye" style="color: var(--primary-dark);"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 py-3 mb-4" 
                            style="background: var(--primary-dark); border-color: var(--primary-dark);">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>
                    
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3">
                <p class="mb-0">Нет аккаунта? 
                    <a href="{% url 'register' %}" class="fw-bold text-decoration-none" 
                       style="color: var(--primary-dark);">Зарегистрируйтесь</a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
.card {
    border-radius: 15px;
    overflow: hidden;
    transition: all 0.4s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15) !important;
}

.input-group-text {
    border: 1px solid;
    transition: all 0.3s ease;
}

.form-control {
    border: 1px solid;
    transition: all 0.3s ease;
}

.form-control:focus {
    box-shadow: 0 0 0 0.2rem rgba(26, 60, 52, 0.25);
    border-color: var(--primary-dark);
}

.toggle-password {
    cursor: pointer;
    border: 1px solid;
}

.toggle-password:hover {
    background-color: var(--primary-dark) !important;
    color: white !important;
}

.toggle-password:hover i {
    color: white !important;
}

.btn-success:hover {
    background: transparent !important;
    color: var(--primary-dark) !important;
    border: 2px solid var(--primary-dark) !important;
    transform: translateY(-3px);
}

@media (max-width: 768px) {
    .card-body {
        padding: 2rem !important;
    }
    
    .btn-lg {
        padding: 0.75rem 1.5rem;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Переключение видимости пароля
    document.querySelector('.toggle-password').addEventListener('click', function() {
        const passwordInput = document.getElementById('id_password');
        const icon = this.querySelector('i');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    });
    
    // Валидация формы
    const form = document.querySelector('.needs-validation');
    form.addEventListener('submit', function(event) {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }
        form.classList.add('was-validated');
    });

    // Анимация карточки
    const card = document.querySelector('.card');
    card.style.transition = 'all 0.4s ease';
});
</script>
{% endblock %}
